name: CD

# Continuous deployment:
#   • frontend  → Vercel production on every push to main
#   • contracts → Stellar testnet on manual dispatch (needs deployer secret)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Deploy the frontend to Vercel ────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel (production)
        working-directory: app
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Deploy the Soroban contracts to testnet (manual) ─────────────────────
  deploy-contracts:
    name: Deploy contracts (Stellar testnet)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build contracts
        working-directory: contracts
        run: stellar contract build

      - name: Deploy to testnet
        run: bash scripts/deploy.sh
        env:
          STELLAR_NETWORK: testnet
          STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          DEPLOYER_SECRET_KEY: ${{ secrets.DEPLOYER_SECRET_KEY }}
