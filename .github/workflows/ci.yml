name: CI

# Continuous integration for both the Soroban smart contracts and the frontend.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Smart contract CI: build + test the Soroban contracts ────────────────
  contracts:
    name: Smart Contracts (build & test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}

      - name: Check formatting
        working-directory: contracts
        run: cargo fmt --all --check
        continue-on-error: true

      - name: Run contract unit tests
        working-directory: contracts
        run: cargo test --all

      - name: Build contracts to wasm (release)
        working-directory: contracts
        run: cargo build --all --target wasm32v1-none --release

  # ── Frontend CI: install + lint + production build ───────────────────────
  frontend:
    name: Frontend (build & lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --workspace=app
        continue-on-error: true

      - name: Production build
        run: npm run build --workspace=app
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
